{% extends "base.html" %}
{% block title %}Change Password — TweetBox{% endblock %}
{% block content %}
<div class="form-card">
  <h1>Change Password</h1>
  {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
  {% if success %}<div class="alert alert-success">{{ success }}</div>{% endif %}
  <form method="post" action="/change_password">
    <div class="field-group">
      <label for="old_password">Current Password</label>
      <input type="password" id="old_password" name="old_password" required autofocus placeholder="••••••••">
    </div>
    <div class="field-group">
      <label for="new_password">New Password</label>
      <input type="password" id="new_password" name="new_password" required placeholder="••••••••">
    </div>
    <div class="field-group">
      <label for="new_password2">Confirm New Password</label>
      <input type="password" id="new_password2" name="new_password2" required placeholder="••••••••">
    </div>
    <button type="submit" class="btn-primary">Update Password</button>
  </form>
</div>
{% endblock %}
